name: Refresh dataset

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build:data
      - run: npm run build:snapshot
      - run: npm test
      - name: Commit updated dataset
        run: |
          if git diff --quiet data/ sdk/src/; then
            echo "Dataset unchanged."
            exit 0
          fi
          git config user.name "mailverdict-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ sdk/src/
          git commit -m "data: daily refresh $(date -u +%F)"
          git push
      # The dataset is bundled into the worker, so each refresh must redeploy
      # or the live API goes stale. Skipped when the CLOUDFLARE_API_TOKEN
      # secret is absent ("Edit Cloudflare Workers" token template).
      - name: Deploy worker with fresh dataset
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler deploy
